general_config:
  algo_name: "REINFORCE"
  env_name: "MiniGrid-Empty-5x5-v0"
  env_render: "rgb_array"
  project_name: "MiniGrid-Empty-5x5-REINFORCE"
  device: cuda:1
  mode: train
  seed: 42
  train_episodes: 1000
  eval_eps: 5
  eval_freq: 10

sweep_config:
  method: bayes
  metric:
    goal: maximize
    name: val/reward
  parameters:
    lr: 
      distribution: uniform
      max: 0.001
      min: 0.0001
    gamma:
      max: 0.99
      min: 0.9